# Reusable, stack-AGNOSTIC security scanners for NapticStacks repos.
#
# Call from a repo's .github/workflows/ci.yml with the caller job-id `security`
# so the emitted check contexts are deterministic:
#   security / Secrets (gitleaks)   <- HARD gate (the required status check)
#   security / IaC (checkov)        <- evidence (soft-fail, green-skips if no IaC)
#   security / Trivy                <- evidence (soft-fail, green-skips if nothing found)
#
# SOC 2 evidence retention: every job uploads its report as an artifact with
# retention-days: 90, if: always(). GHAS code-scanning is NOT enabled on these
# repos, so we gate via exit code (gitleaks) + retain SARIF/JSON artifacts rather
# than uploading to code-scanning.
#
# All `uses:` are pinned to immutable commit SHAs. Bump only via a reviewed PR.

name: Reusable Security (agnostic)

on:
  workflow_call:
    inputs:
      checkov_frameworks:
        description: "Comma-separated checkov frameworks to scan."
        type: string
        default: "dockerfile,github_actions,cloudformation,kubernetes,secrets"
      checkov_skip_paths:
        description: "Comma-separated paths checkov should skip (repeatable via newline)."
        type: string
        default: "node_modules"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0  # full history for push/cron full scan
      - name: Install gitleaks CLI (OSS, pinned sha256)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect --source . \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact --verbose --no-banner --report-format sarif --report-path gitleaks.sarif
      - name: Run gitleaks (full history)
        if: github.event_name != 'pull_request'
        run: |
          gitleaks detect --source . \
            --redact --verbose --no-banner --report-format sarif --report-path gitleaks.sarif
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 90

  checkov:
    name: IaC (checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          python-version: "3.12"
      - name: Install checkov
        run: uv tool install "checkov>=3,<4"
      - name: Run checkov (soft-fail evidence; green when no IaC present)
        # --soft-fail keeps this job green even with findings or no relevant
        # files, so it never hangs a repo (podcast/sales-naptic) that has no
        # Docker/IaC. Findings live in the SARIF artifact for review.
        run: |
          uv tool run checkov \
            --directory . \
            --framework ${{ inputs.checkov_frameworks }} \
            --skip-path ${{ inputs.checkov_skip_paths }} \
            --soft-fail \
            --output sarif --output-file-path . \
            --quiet || true
      - name: Upload checkov report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: checkov-sarif
          path: results_sarif.sarif
          if-no-files-found: ignore
          retention-days: 90

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - name: Run Trivy filesystem scan (soft-fail evidence)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          exit-code: "0"          # evidence, not a gate
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: trivy-sarif
          path: trivy.sarif
          if-no-files-found: ignore
          retention-days: 90
